name: OmniCouncil CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──
  backend-tests:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libasound2 libnss3 libxss1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install backend and engine packages
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          for d in packages/*/; do pip install -e "$d"; done
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ── Frontend Build ──
  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          ls dist/assets/*.js > /dev/null
          echo "Frontend build successful"

  # ── Heartbeat & Soak Test (main only) ──
  heartbeat-and-soak-test:
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    needs: [backend-tests]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get install -y libgbm1 libasound2 libnss3 libxss1
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          for d in packages/*/; do pip install -e "$d"; done

      - name: Start backend for heartbeat check
        run: |
          source .venv/bin/activate
          python main.py --port 8765 &
          BACKEND_PID=$!
          sleep 65
          curl -s http://127.0.0.1:8765/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'; print(f'Hearbeat: {len(d[\"ais\"])} AIs OK')"
          kill $BACKEND_PID 2>/dev/null

      - name: Soak test (10 min)
        run: |
          source .venv/bin/activate
          python main.py --port 8765 &
          BACKEND_PID=$!
          for i in 1 2; do
            sleep 300
            curl -s http://127.0.0.1:8765/health > /dev/null && echo "Soak $i: OK"
          done
          kill $BACKEND_PID 2>/dev/null
          echo "Soak test done"

  # ── Engine Package Verification ──
  engine-packages-verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify each engine package installs independently
        run: |
          for pkg in backend/packages/*/; do
            if [ -f "$pkg/pyproject.toml" ]; then
              name=$(basename $pkg)
              echo "=== Verifying $name ==="
              python -m venv /tmp/test-venv
              source /tmp/test-venv/bin/activate
              pip install -e "$pkg" -q
              import_name=$(echo "$name" | tr '-' '_')
              python -c "import $import_name; print('$name: OK')"
              deactivate
              rm -rf /tmp/test-venv
            fi
          done
