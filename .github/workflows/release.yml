name: Release (Windows Build)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python deps
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller

      - name: Build backend with PyInstaller
        run: python scripts/build-backend.py

      - name: Install Node deps
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri App
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: OmniCouncil-${{ inputs.version }}-x64-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: OmniCouncil-${{ inputs.version }}-portable
          path: src-tauri/target/release/OmniCouncil.exe

  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Node deps
        run: npm ci

      - name: Install Patchright browsers
        run: patchright install chromium

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ --tb=short -q

      - name: Build frontend
        run: npm run build
