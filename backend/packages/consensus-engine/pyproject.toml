[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnicounci1l-consensus"
version = "1.0.0"
description = "Consensus analysis engine for OmniCouncil — finds agreement and disagreement between AI responses"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "omnicounci1l-core>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
