[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnicounci1l-comparison"
version = "2.0.0"
description = "Comparison analysis engine for OmniCouncil — 6-stage pipeline for multi-AI response analysis"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "omnicounci1l-core>=1.0.0",
    "numpy>=1.24",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
