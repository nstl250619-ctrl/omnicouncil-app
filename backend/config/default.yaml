# OmniCouncil Default Configuration

# ========== Runtime Engine Configuration ==========
runtime:
  # Heartbeat interval for health monitoring (seconds)
  heartbeat_interval_s: 60
  # Maximum consecutive recovery attempts before UNAVAILABLE
  max_recovery_attempts: 3
  # Cooldown between recovery rounds (seconds)
  recovery_cooldown_s: 30
  # Session check mode: "offline" | "online" | "offline_then_online"
  session_check_mode: "offline_then_online"
  # Page eviction thresholds
  page_max_age_s: 600        # 10 minutes
  page_max_idle_s: 120       # 2 minutes
  # Watchdog interval for visible windows like ChatGPT (seconds)
  watchdog_interval_s: 30
  # Profile directory (default: ~/.omnicouncil/auth)
  profile_dir: null
  # Backup retention per platform
  max_backups: 3

  # Per-platform overrides
  platforms:
    deepseek:
      home_url: "https://chat.deepseek.com"
      headless: true
    qianwen:
      home_url: "https://www.qianwen.com/qianwen"
      headless: true
    gemini:
      home_url: "https://gemini.google.com/app"
      headless: true
    chatgpt:
      home_url: "https://chatgpt.com"
      headless: false  # ChatGPT needs non-headless for Cloudflare
    mimo:
      home_url: "https://aistudio.xiaomimimo.com/#/"
      headless: true

scheduler:
  max_concurrent_tasks: 3
  ai_min_interval_ms: 1000
  default_timeout_ms: 90000
  soft_timeout_ms: 45000
  hard_timeout_ms: 90000
  retry:
    max_retries: 1
    retry_delay_ms: 2000
    backoff_multiplier: 1.0

comparison:
  similarity_method: tfidf
  tfidf_weight: 0.5
  lcs_weight: 0.5
  similarity_threshold: 0.6
  high_similarity: 0.85
  difference_trigger: 0.4
  uniqueness_threshold: 0.3
  min_paragraph_length: 10
  max_units_per_ai: 100

rate_limits:
  deepseek:
    max_per_minute: 10
    min_interval_ms: 3000
    cooldown_after_n: 15
    cooldown_duration_ms: 30000
  gemini:
    max_per_minute: 5
    min_interval_ms: 5000
    cooldown_after_n: 10
    cooldown_duration_ms: 30000
  qianwen:
    max_per_minute: 10
    min_interval_ms: 3000
    cooldown_after_n: 15
    cooldown_duration_ms: 30000
