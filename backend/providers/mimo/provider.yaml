id: mimo
display_name: MiMo
home_url: https://aistudio.xiaomimimo.com/#/
headless: true
heartbeat_interval_s: 60
max_recovery_attempts: 3
recovery_cooldown_s: 30
session_check_mode: offline_then_online

auth:
  method: cookie
  cookie:
    domains: [xiaomi.com, account.xiaomi.com]
    names: [passToken, userId, session, token, auth]
    match: prefix

page:
  input_selectors:
    - "[contenteditable='true'][role='textbox']"
    - "[contenteditable='true']"
    - "div[contenteditable='true']"
    - textarea
    - "[role='textbox']"
    - "main textarea"
    - "main [contenteditable='true']"
  response_selectors:
    - '[data-role="assistant"]'
    - '[class*="assistant"]'
    - '[class*="response"]'
    - '[class*="bot-message"]'
    - '[class*="ai-message"]'
  stop_button_selectors:
    - 'button[aria-label="Stop generating"]'
    - 'button:has-text("Stop")'
    - 'button:has-text("停止")'
  ui_elements:
    - MiMo
    - New chat
    - Settings
    - Sign in
    - Send
    - Copy
    - Regenerate
    - Help
    - History
  login_url_patterns:
    - login
    - signin
    - sign-in
  cloudflare_check: false

capabilities:
  supports_streaming: true
  supports_file_upload: false
  supports_image: false
  max_input_chars: 10000
  response_format: markdown
  requires_chat_mode: true
